<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeHer - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body {
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .logo { font-size: 48px; margin-bottom: 10px; }
    .title { font-size: 32px; font-weight: 700; color: #9b59b6; margin-bottom: 5px; }
    .subtitle { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 40px; text-align: center; }
    .login-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .step { display: none; }
    .step.active { display: block; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
    .input-group input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 15px;
      color: white;
      font-size: 16px;
      outline: none;
    }
    .input-group input:focus { border-color: #9b59b6; }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-primary { background: #9b59b6; color: white; }
    .btn-primary:hover { background: #8e44ad; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: white; margin-top: 10px; }
    .error { color: #e74c3c; font-size: 13px; margin-top: 10px; text-align: center; }
    .success { color: #2ecc71; font-size: 13px; margin-top: 10px; text-align: center; }
    #recaptcha-container { margin: 15px 0; }

    /* FIXED phone input */
    .phone-input { display: flex; gap: 10px; align-items: stretch; }
    .country-code-label {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 15px;
      color: white;
      font-size: 16px;
      white-space: nowrap;
      display: flex;
      align-items: center;
    }
    #phoneNumber {
      flex: 1;
      width: 0;
      min-width: 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 15px;
      color: white;
      font-size: 16px;
      outline: none;
    }
    #phoneNumber:focus { border-color: #9b59b6; }

    .loading { text-align: center; padding: 20px; color: rgba(255,255,255,0.6); }
    .otp-inputs { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
    .otp-input {
      width: 45px;
      height: 55px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: white;
      font-size: 24px;
      text-align: center;
      outline: none;
    }
    .otp-input:focus { border-color: #9b59b6; }
  </style>
</head>
<body>

  <div class="logo">🛡️</div>
  <div class="title">SafeHer</div>
  <div class="subtitle">Your AI-powered safety companion</div>

  <div class="login-card">

    <!-- STEP 1: Phone Number -->
    <div class="step active" id="step1">
      <h3 style="margin-bottom:20px;font-size:20px;">Enter Your Phone Number</h3>
      <div class="input-group">
        <label>Phone Number</label>
        <div class="phone-input">
          <span class="country-code-label">+91</span>
          <input type="tel" id="phoneNumber" placeholder="9999999999" maxlength="10" inputmode="numeric"/>
        </div>
      </div>
      <div id="recaptcha-container"></div>
      <button class="btn btn-primary" onclick="sendOTP()">Send OTP 📱</button>
      <div id="step1Error" class="error"></div>
    </div>

    <!-- STEP 2: OTP Verification -->
    <div class="step" id="step2">
      <h3 style="margin-bottom:10px;font-size:20px;">Enter OTP</h3>
      <p style="color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:20px;">
        OTP sent to <span id="phoneDisplay"></span>
      </p>
      <div class="otp-inputs">
        <input type="text" class="otp-input" id="otp1" maxlength="1" inputmode="numeric" oninput="moveToNext(this,'otp2')"/>
        <input type="text" class="otp-input" id="otp2" maxlength="1" inputmode="numeric" oninput="moveToNext(this,'otp3')"/>
        <input type="text" class="otp-input" id="otp3" maxlength="1" inputmode="numeric" oninput="moveToNext(this,'otp4')"/>
        <input type="text" class="otp-input" id="otp4" maxlength="1" inputmode="numeric" oninput="moveToNext(this,'otp5')"/>
        <input type="text" class="otp-input" id="otp5" maxlength="1" inputmode="numeric" oninput="moveToNext(this,'otp6')"/>
        <input type="text" class="otp-input" id="otp6" maxlength="1" inputmode="numeric" oninput="autoVerify()"/>
      </div>
      <button class="btn btn-primary" onclick="verifyOTP()">Verify & Login ✅</button>
      <button class="btn btn-secondary" onclick="resendOTP()">Resend OTP</button>
      <div id="step2Error" class="error"></div>
    </div>

    <!-- STEP 3: Profile Setup -->
    <div class="step" id="step3">
      <h3 style="margin-bottom:20px;font-size:20px;">Setup Your Profile</h3>
      <div class="input-group">
        <label>Your Name</label>
        <input type="text" id="userName" placeholder="Enter your name"/>
      </div>
      <div class="input-group">
        <label>Emergency Contact 1 Name</label>
        <input type="text" id="contact1Name" placeholder="Mom"/>
      </div>
      <div class="input-group">
        <label>Emergency Contact 1 Phone</label>
        <input type="tel" id="contact1Phone" placeholder="+919876543210"/>
      </div>
      <div class="input-group">
        <label>Emergency Contact 2 Name (Optional)</label>
        <input type="text" id="contact2Name" placeholder="Dad"/>
      </div>
      <div class="input-group">
        <label>Emergency Contact 2 Phone (Optional)</label>
        <input type="tel" id="contact2Phone" placeholder="+919876543210"/>
      </div>
      <button class="btn btn-primary" onclick="saveProfile()">Save & Start 🛡️</button>
      <div id="step3Error" class="error"></div>
    </div>

    <!-- STEP 4: Loading -->
    <div class="step" id="step4">
      <div class="loading">
        <div style="font-size:48px;margin-bottom:20px;">🛡️</div>
        <div style="font-size:18px;margin-bottom:10px;">Setting up SafeHer...</div>
        <div style="color:rgba(255,255,255,0.5);font-size:14px;">Please wait...</div>
      </div>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC_cFOpL7irYXrK27ImvlV2YTNQDifPYqM",
      authDomain: "safeher-28bb2.firebaseapp.com",
      databaseURL: "https://safeher-28bb2-default-rtdb.firebaseio.com",
      projectId: "safeher-28bb2",
      storageBucket: "safeher-28bb2.firebasestorage.app",
      messagingSenderId: "1093714755282",
      appId: "1:1093714755282:web:2095969d84ec69d088770b"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let confirmationResult = null;
    let recaptchaVerifier = null;
    let otpSent = false;

    // If already logged in → go to app
    auth.onAuthStateChanged((user) => {
      if (user && otpSent) {
        window.location.href = 'index.html';
      }
    });

    function initRecaptcha() {
      if (recaptchaVerifier) return;
      recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        size: 'normal',
        callback: () => console.log('reCAPTCHA solved')
      });
      recaptchaVerifier.render();
    }

    async function sendOTP() {
      const raw = document.getElementById('phoneNumber').value;
      const digits = raw.replace(/\D/g, '');
      const fullPhone = '+91' + digits;
      const errorEl = document.getElementById('step1Error');

      if (digits.length !== 10) {
        errorEl.textContent = '⚠️ Enter exactly 10 digits. Got: ' + digits.length;
        return;
      }

      errorEl.textContent = 'Sending OTP...';
      errorEl.style.color = '#2ecc71';

      try {
        if (!recaptchaVerifier) initRecaptcha();
        confirmationResult = await auth.signInWithPhoneNumber(fullPhone, recaptchaVerifier);
        otpSent = true;

        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        document.getElementById('phoneDisplay').textContent = fullPhone;
        document.getElementById('otp1').focus();

      } catch(err) {
        console.error(err);
        errorEl.textContent = '⚠️ ' + err.message;
        errorEl.style.color = '#e74c3c';
        if (recaptchaVerifier) {
          recaptchaVerifier.clear();
          recaptchaVerifier = null;
          document.getElementById('recaptcha-container').innerHTML = '';
          setTimeout(initRecaptcha, 500);
        }
      }
    }

    function moveToNext(current, nextId) {
      if (current.value.length >= 1) {
        document.getElementById(nextId)?.focus();
      }
    }

    function autoVerify() {
      const otp = ['otp1','otp2','otp3','otp4','otp5','otp6']
        .map(id => document.getElementById(id).value).join('');
      if (otp.length === 6) verifyOTP();
    }

    async function verifyOTP() {
      const otp = ['otp1','otp2','otp3','otp4','otp5','otp6']
        .map(id => document.getElementById(id).value).join('');
      const errorEl = document.getElementById('step2Error');

      if (otp.length !== 6) {
        errorEl.textContent = '⚠️ Enter complete 6-digit OTP';
        return;
      }

      errorEl.textContent = 'Verifying...';
      errorEl.style.color = '#2ecc71';

      try {
        const result = await confirmationResult.confirm(otp);
        const user = result.user;
        const snapshot = await db.ref(`users/${user.uid}`).once('value');

        if (snapshot.exists()) {
          const profile = snapshot.val();
          localStorage.setItem('safeher_user_id', user.uid);
          localStorage.setItem('safeher_user_name', profile.name);
          if (profile.contacts) {
            localStorage.setItem('safeher_contacts', JSON.stringify(profile.contacts));
          }
          window.location.href = 'index.html';
        } else {
          document.getElementById('step2').classList.remove('active');
          document.getElementById('step3').classList.add('active');
        }

      } catch(err) {
        console.error(err);
        if (err.code === 'auth/invalid-verification-code') {
          errorEl.textContent = '⚠️ Wrong OTP! Try again.';
        } else if (err.code === 'auth/code-expired') {
          errorEl.textContent = '⚠️ OTP expired! Resend karo.';
        } else {
          errorEl.textContent = '⚠️ ' + err.message;
        }
        errorEl.style.color = '#e74c3c';
      }
    }

    function resendOTP() {
      otpSent = false;
      recaptchaVerifier = null;
      document.getElementById('recaptcha-container').innerHTML = '';
      document.getElementById('step2').classList.remove('active');
      document.getElementById('step1').classList.add('active');
      setTimeout(initRecaptcha, 500);
    }

    async function saveProfile() {
      const name = document.getElementById('userName').value.trim();
      const c1Name = document.getElementById('contact1Name').value.trim();
      const c1Phone = document.getElementById('contact1Phone').value.trim();
      const c2Name = document.getElementById('contact2Name').value.trim();
      const c2Phone = document.getElementById('contact2Phone').value.trim();
      const errorEl = document.getElementById('step3Error');

      if (!name || !c1Name || !c1Phone) {
        errorEl.textContent = '⚠️ Name aur Contact 1 required hai!';
        return;
      }

      document.getElementById('step3').classList.remove('active');
      document.getElementById('step4').classList.add('active');

      try {
        const user = auth.currentUser;
        const contacts = [];
        if (c1Name && c1Phone) contacts.push({ name: c1Name, phone: c1Phone });
        if (c2Name && c2Phone) contacts.push({ name: c2Name, phone: c2Phone });

        await db.ref(`users/${user.uid}`).set({
          name, phone: user.phoneNumber,
          contacts, createdAt: new Date().toISOString()
        });

        localStorage.setItem('safeher_user_id', user.uid);
        localStorage.setItem('safeher_user_name', name);
        localStorage.setItem('safeher_contacts', JSON.stringify(contacts));

        setTimeout(() => { window.location.href = 'index.html'; }, 1500);

      } catch(err) {
        errorEl.textContent = '⚠️ Error: ' + err.message;
      }
    }

    window.onload = () => setTimeout(initRecaptcha, 1000);
  </script>
</body>
</html>
