<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeHer - Live Location Tracking</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
    body { background: #1a1a2e; color: white; }
    .header {
      background: #e74c3c;
      padding: 20px;
      text-align: center;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { background: #e74c3c; }
      50% { background: #c0392b; }
    }
    .header h1 { font-size: 24px; }
    .header p { font-size: 14px; opacity: 0.9; margin-top: 5px; }
    #map { height: 60vh; width: 100%; }
    .info-panel {
      padding: 20px;
      background: #16213e;
    }
    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 14px;
    }
    .info-item span:first-child { color: rgba(255,255,255,0.6); }
    .info-item span:last-child { color: white; font-weight: 600; }
    .action-buttons {
      padding: 20px;
      display: flex;
      gap: 15px;
      flex-direction: column;
    }
    .btn {
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }
    .btn-call { background: #2ecc71; color: white; }
    .btn-police { background: #e74c3c; color: white; }
    .btn-share { background: #9b59b6; color: white; }
    .status-badge {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      background: #e74c3c;
      color: white;
      margin-left: 10px;
    }
    .last-updated {
      text-align: center;
      padding: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>

  <!-- EMERGENCY HEADER -->
  <div class="header">
    <h1>🆘 EMERGENCY ALERT <span class="status-badge">LIVE</span></h1>
    <p id="victimName">SafeHer User needs immediate help!</p>
  </div>

  <!-- LIVE MAP -->
  <div id="map"></div>

  <!-- INFO PANEL -->
  <div class="info-panel">
    <div class="info-item">
      <span>📍 Last Location</span>
      <span id="locationText">Getting location...</span>
    </div>
    <div class="info-item">
      <span>⏰ Alert Time</span>
      <span id="alertTime">-</span>
    </div>
    <div class="info-item">
      <span>🔄 Last Updated</span>
      <span id="lastUpdated">-</span>
    </div>
    <div class="info-item">
      <span>📊 Status</span>
      <span style="color:#e74c3c">🔴 ACTIVE EMERGENCY</span>
    </div>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="action-buttons">
    <a href="tel:112" class="btn btn-police">
      🚔 Call Police (112)
    </a>
    <button class="btn btn-call" onclick="callVictim()">
      📞 Call Her Now
    </button>
    <button class="btn btn-share" onclick="shareLocation()">
      📤 Share This Alert
    </button>
  </div>

  <div class="last-updated">
    Location updates every 10 seconds
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyC_cFOpL7irYXrK27ImvlV2YTNQDifPYqM",
      authDomain: "safeher-28bb2.firebaseapp.com",
      databaseURL: "https://safeher-28bb2-default-rtdb.firebaseio.com",
      projectId: "safeher-28bb2",
      storageBucket: "safeher-28bb2.firebasestorage.app",
      messagingSenderId: "1093714755282",
      appId: "1:1093714755282:web:2095969d84ec69d088770b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Get alert ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const alertId = urlParams.get('id') || 'latest';

    // Initialize map
    let map = L.map('map').setView([20.5937, 78.9629], 5);
    let userMarker = null;
    let pathPoints = [];
    let pathLine = null;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    const sosIcon = L.divIcon({
      html: '🆘',
      className: 'emoji-icon',
      iconSize: [40, 40]
    });

    // Listen to Firebase for live updates
    db.ref('sos_alerts').limitToLast(1).on('value', (snapshot) => {
      snapshot.forEach((child) => {
        const alert = child.val();
        if (alert && alert.location) {
          updateMap(alert.location, alert.timestamp);
        }
      });
    });

    // Listen for location updates
    db.ref('live_location').on('value', (snapshot) => {
      const data = snapshot.val();
      if (data && data.lat && data.lng) {
        updateMap(data, data.timestamp);
      }
    });

    function updateMap(location, timestamp) {
      const lat = location.lat;
      const lng = location.lng;

      if (!lat || !lng) return;

      // Update marker
      if (userMarker) {
        userMarker.setLatLng([lat, lng]);
      } else {
        userMarker = L.marker([lat, lng], {icon: sosIcon})
          .addTo(map)
          .bindPopup('🆘 Emergency Location!')
          .openPopup();
        map.setView([lat, lng], 15);
      }

      // Draw path
      pathPoints.push([lat, lng]);
      if (pathLine) {
        map.removeLayer(pathLine);
      }
      if (pathPoints.length > 1) {
        pathLine = L.polyline(pathPoints, {
          color: '#e74c3c',
          weight: 3,
          opacity: 0.7
        }).addTo(map);
      }

      // Update info
      document.getElementById('locationText').textContent =
        `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      document.getElementById('lastUpdated').textContent =
        new Date().toLocaleTimeString();

      if (timestamp) {
        document.getElementById('alertTime').textContent =
          new Date(timestamp).toLocaleString();
      }
    }

    function callVictim() {
      alert('📞 Calling her now...\nIf no answer, call 112 immediately!');
    }

    function shareLocation() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({
          title: '🆘 SafeHer Emergency Alert',
          text: 'Someone needs help! Track their live location:',
          url: url
        });
      } else {
        navigator.clipboard.writeText(url);
        alert('Link copied! Share it with others who can help.');
      }
    }
  </script>
</body>
</html>
